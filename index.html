<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Pedidos</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:20px;
}

h1,h2{color:#333;}

.card-container{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
min-width:180px;
}

.card h3{
margin:0;
font-size:30px;
color:#007bff;
}

.formulario{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.formulario input,
.formulario select{
padding:8px;
margin:5px;
width:220px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
font-size:13px;
transition: all 0.2s ease;
box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

button:active{transform:scale(0.97);}

.btn-agregar{background:linear-gradient(135deg,#007bff,#0056d2);color:white;}
.btn-check{background:linear-gradient(135deg,#28a745,#1e7e34);color:white;padding:6px 10px;font-size:12px;}
.btn-trash{background:linear-gradient(135deg,#dc3545,#a71d2a);color:white;padding:6px 10px;font-size:12px;}
.btn-edit{background:linear-gradient(135deg,#ffc107,#e0a800);color:white;padding:6px 10px;font-size:12px;}

.estado-pendiente{color:#dc3545;font-weight:bold;}
.estado-entregado{color:#28a745;font-weight:bold;}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#007bff;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
font-size:14px;
}

.filtros{
margin-bottom:20px;
}

.filtros input,
.filtros select{
padding:8px;
margin-right:10px;
}
</style>
</head>

<body>

<h1>📦 Sistema de Gestión de Pedidos</h1>

<div class="card-container">
<div class="card"><h3 id="pendientes">0</h3><p>Pendientes</p></div>
<div class="card"><h3 id="entregados">0</h3><p>Entregados</p></div>
<div class="card"><h3 id="total">0</h3><p>Total</p></div>
</div>

<div class="formulario">
<h2>Nuevo / Editar Pedido</h2>

<input type="text" id="cliente" placeholder="Cliente">
<input type="text" id="telefono" placeholder="Teléfono">
<input type="text" id="direccion" placeholder="Dirección">
<input type="text" id="distrito" placeholder="Distrito">
<input type="text" id="vendedor" placeholder="Vendedor">

<select id="medioPago">
<option>Efectivo</option>
<option>Yape</option>
<option>Plin</option>
<option>Transferencia</option>
<option>Tarjeta</option>
</select>

<select id="camion">
<option>Camión 1</option>
<option>Camión 2</option>
<option>Camión 3</option>
</select>

<input type="text" id="observaciones" placeholder="Observaciones">

<button class="btn-agregar" onclick="guardarPedido()">Guardar Pedido</button>
</div>

<div class="filtros">
<select id="filtroDistrito">
<option value="">Todos</option>
</select>

<input type="date" id="filtroFecha">

<button onclick="aplicarFiltros()">Filtrar</button>
<button onclick="limpiarFiltros()">Limpiar</button>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Cliente</th>
<th>Teléfono</th>
<th>Dirección</th>
<th>Distrito</th>
<th>Vendedor</th>
<th>Pago</th>
<th>Camión</th>
<th>Fecha</th>
<th>Estado</th>
<th>Observaciones</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tablaPedidos"></tbody>
</table>

<script>

// ============================================
// CAMBIA ESTA URL POR LA TUYA DE APPS SCRIPT
// ============================================
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7Y0GcErEntZoiw0cQi5VdiCe4OhK3KOU5TCSkMWgedGgClhKrjIscS-uytVozXQbk/exec";

let pedidos = [];
let pedidosFiltrados = [];
let editandoId = null;

window.onload = () => cargarDesdeSheets();

/* =========================
   FETCH SEGURO
========================= */
async function sendToSheets(payload) {
  try {
    const response = await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload)
    });

    const text = await response.text();
    console.log("RESPUESTA RAW:", text);

    try {
      return JSON.parse(text);
    } catch {
      return { ok: false, error: "Respuesta no es JSON", raw: text };
    }

  } catch (err) {
    console.error("ERROR FETCH:", err);
    alert("Error de conexión: " + err.message);
    throw err;
  }
}

/* =========================
   CARGAR DATOS
========================= */
async function cargarDesdeSheets() {
  try {
    const res = await fetch(GOOGLE_SCRIPT_URL);
    const data = await res.json();

    console.log("Datos cargados:", data);

    pedidos = data || [];
    pedidosFiltrados = [...pedidos];

    renderTabla();
    actualizarDashboard();
    cargarDistritos();

  } catch (err) {
    console.error("ERROR GET:", err);
  }
}

/* =========================
   GUARDAR / EDITAR
========================= */
async function guardarPedido() {
  const ahora = new Date();
  const fechaLocal = ahora.getFullYear() + "-" + 
    String(ahora.getMonth() + 1).padStart(2, '0') + "-" + 
    String(ahora.getDate()).padStart(2, '0') + " " + 
    String(ahora.getHours()).padStart(2, '0') + ":" + 
    String(ahora.getMinutes()).padStart(2, '0');

  const data = {
    id: editandoId || Date.now(),
    cliente: document.getElementById("cliente").value,
    telefono: document.getElementById("telefono").value,
    direccion: document.getElementById("direccion").value,
    distrito: document.getElementById("distrito").value,
    vendedor: document.getElementById("vendedor").value,
    medioPago: document.getElementById("medioPago").value,
    camion: document.getElementById("camion").value,
    observaciones: document.getElementById("observaciones").value,
    fecha: fechaLocal,
    estado: "Pendiente"
  };

  if (editandoId) {
    await sendToSheets({ action: "update", ...data });
    editandoId = null;
  } else {
    await sendToSheets({ action: "add", ...data });
  }

  limpiarFormulario();
  await cargarDesdeSheets();
}

/* =========================
   EDITAR
========================= */
function editarPedido(id) {
  const p = pedidos.find(x => String(x.id) === String(id));
  if (!p) return;

  editandoId = id;

  document.getElementById("cliente").value = p.cliente || "";
  document.getElementById("telefono").value = p.telefono || "";
  document.getElementById("direccion").value = p.direccion || "";
  document.getElementById("distrito").value = p.distrito || "";
  document.getElementById("vendedor").value = p.vendedor || "";
  document.getElementById("medioPago").value = p.medioPago || "Efectivo";
  document.getElementById("camion").value = p.camion || "Camión 1";
  document.getElementById("observaciones").value = p.observaciones || "";
}

/* =========================
   ELIMINAR
========================= */
async function eliminarPedido(id) {
  if (!confirm("¿Eliminar pedido?")) return;

  await sendToSheets({ action: "delete", id: id });
  await cargarDesdeSheets();
}

/* =========================
   ESTADO
========================= */
async function cambiarEstado(id) {
  const p = pedidos.find(x => String(x.id) === String(id));
  if (!p) return;

  p.estado = p.estado === "Entregado" ? "Pendiente" : "Entregado";

  await sendToSheets({
    action: "updateStatus",
    id: p.id,
    estado: p.estado
  });

  await cargarDesdeSheets();
}

/* =========================
   FILTROS
========================= */
function aplicarFiltros() {
  const d = document.getElementById("filtroDistrito").value;
  const f = document.getElementById("filtroFecha").value;

  pedidosFiltrados = pedidos.filter(p => {
    const coincideDistrito = !d || p.distrito === d;
    const coincideFecha = !f || (p.fecha && p.fecha.startsWith(f));
    return coincideDistrito && coincideFecha;
  });

  renderTabla();
}

function limpiarFiltros() {
  document.getElementById("filtroDistrito").value = "";
  document.getElementById("filtroFecha").value = "";
  pedidosFiltrados = [...pedidos];
  renderTabla();
}

/* =========================
   UI
========================= */
function actualizarDashboard() {
  document.getElementById("pendientes").innerText =
    pedidos.filter(p => p.estado === "Pendiente").length;

  document.getElementById("entregados").innerText =
    pedidos.filter(p => p.estado === "Entregado").length;

  document.getElementById("total").innerText = pedidos.length;
}

function cargarDistritos() {
  const sel = document.getElementById("filtroDistrito");
  sel.innerHTML = `<option value="">Todos</option>`;

  [...new Set(pedidos.map(p => p.distrito).filter(Boolean))].forEach(d => {
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d;
    sel.appendChild(opt);
  });
}

function renderTabla() {
  const tabla = document.getElementById("tablaPedidos");
  tabla.innerHTML = "";

  pedidosFiltrados.forEach(p => {
    // Manejo seguro de la fecha
    let fechaMostrar = "-";
    if (p.fecha) {
      try {
        const fechaObj = new Date(p.fecha);
        if (!isNaN(fechaObj.getTime())) {
          fechaMostrar = fechaObj.toLocaleString('es-PE', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
          });
        } else {
          fechaMostrar = p.fecha; // Si no es fecha válida, muestra el texto
        }
      } catch (e) {
        fechaMostrar = p.fecha || "-";
      }
    }

    tabla.innerHTML += `
      <tr>
        <td>${p.id}</td>
        <td>${p.cliente || ''}</td>
        <td>${p.telefono || ''}</td>
        <td>${p.direccion || ''}</td>
        <td>${p.distrito || ''}</td>
        <td>${p.vendedor || ''}</td>
        <td>${p.medioPago || ''}</td>
        <td>${p.camion || ''}</td>
        <td>${fechaMostrar}</td>
        <td class="${p.estado === 'Entregado' ? 'estado-entregado' : 'estado-pendiente'}">
          ${p.estado || 'Pendiente'}
        </td>
        <td>${p.observaciones || ''}</td>
        <td>
          <button class="btn-check" onclick="cambiarEstado('${p.id}')">✓</button>
          <button class="btn-edit" onclick="editarPedido('${p.id}')">✏️</button>
          <button class="btn-trash" onclick="eliminarPedido('${p.id}')">🗑</button>
        </td>
      </tr>
    `;
  });
}

/* =========================
   LIMPIAR FORM
========================= */
function limpiarFormulario() {
  document.getElementById("cliente").value = "";
  document.getElementById("telefono").value = "";
  document.getElementById("direccion").value = "";
  document.getElementById("distrito").value = "";
  document.getElementById("vendedor").value = "";
  document.getElementById("observaciones").value = "";
  editandoId = null;
}

</script>

</body>
</html>
