<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Pedidos</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:20px;
}

h1,h2{color:#333;}

.card-container{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
min-width:180px;
}

.card h3{
margin:0;
font-size:30px;
color:#007bff;
}

.formulario{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.formulario input,
.formulario select{
padding:8px;
margin:5px;
width:220px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
font-size:13px;
transition: all 0.2s ease;
box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

button:active{transform:scale(0.97);}

.btn-agregar{background:linear-gradient(135deg,#007bff,#0056d2);color:white;}
.btn-check{background:linear-gradient(135deg,#28a745,#1e7e34);color:white;padding:6px 10px;font-size:12px;}
.btn-trash{background:linear-gradient(135deg,#dc3545,#a71d2a);color:white;padding:6px 10px;font-size:12px;}
.btn-edit{background:linear-gradient(135deg,#ffc107,#e0a800);color:white;padding:6px 10px;font-size:12px;}

.estado-pendiente{color:#dc3545;font-weight:bold;}
.estado-entregado{color:#28a745;font-weight:bold;}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#007bff;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
font-size:14px;
}

.filtros{
margin-bottom:20px;
}

.filtros input,
.filtros select{
padding:8px;
margin-right:10px;
}
</style>
</head>

<body>

<h1>📦 Sistema de Gestión de Pedidos</h1>

<div class="card-container">
<div class="card"><h3 id="pendientes">0</h3><p>Pendientes</p></div>
<div class="card"><h3 id="entregados">0</h3><p>Entregados</p></div>
<div class="card"><h3 id="total">0</h3><p>Total</p></div>
</div>

<div class="formulario">
<h2>Nuevo / Editar Pedido</h2>

<input type="text" id="cliente" placeholder="Cliente">
<input type="text" id="telefono" placeholder="Teléfono">
<input type="text" id="direccion" placeholder="Dirección">
<input type="text" id="distrito" placeholder="Distrito">
<input type="text" id="vendedor" placeholder="Vendedor">

<select id="medioPago">
<option>Efectivo</option>
<option>Yape</option>
<option>Plin</option>
<option>Transferencia</option>
<option>Tarjeta</option>
</select>

<select id="camion">
<option>Camión 1</option>
<option>Camión 2</option>
<option>Camión 3</option>
</select>

<input type="text" id="observaciones" placeholder="Observaciones">

<button class="btn-agregar" onclick="guardarPedido()">Guardar Pedido</button>
</div>

<div class="filtros">
<select id="filtroDistrito">
<option value="">Todos</option>
</select>

<input type="date" id="filtroFecha">

<button onclick="aplicarFiltros()">Filtrar</button>
<button onclick="limpiarFiltros()">Limpiar</button>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Cliente</th>
<th>Teléfono</th>
<th>Dirección</th>
<th>Distrito</th>
<th>Vendedor</th>
<th>Pago</th>
<th>Camión</th>
<th>Fecha</th>
<th>Estado</th>
<th>Observaciones</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tablaPedidos"></tbody>
</table>

<script>

const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKJXQh4zXXHWA6Y9LkHQK3t1-_G3yB7RahlXLN7Z4MzNg77EH9eL-81jKQTDC5R-s/exec";

let pedidos = [];
let pedidosFiltrados = [];
let editandoId = null;

window.onload = () => cargarDesdeSheets();

async function sendToSheets(payload){
await fetch(GOOGLE_SCRIPT_URL,{
method:"POST",
body:JSON.stringify(payload)
});
}

async function cargarDesdeSheets(){
const res = await fetch(GOOGLE_SCRIPT_URL);
const data = await res.json();

pedidos = data || [];
aplicarFiltros();
actualizarDashboard();
cargarDistritos();
}

/* GUARDAR / EDITAR */
async function guardarPedido(){

const data = {
id: editandoId || Date.now(),
cliente: cliente.value,
telefono: telefono.value,
direccion: direccion.value,
distrito: distrito.value,
vendedor: vendedor.value,
medioPago: medioPago.value,
camion: camion.value,
observaciones: observaciones.value,
fecha: new Date().toISOString(),
estado: "Pendiente"
};

if(editandoId){
await sendToSheets({action:"update",...data});
editandoId = null;
}else{
await sendToSheets({action:"add",...data});
}

await cargarDesdeSheets();
limpiarFormulario();
}

/* EDITAR */
function editarPedido(id){

const p = pedidos.find(x=>x.id===id);
if(!p) return;

editandoId = id;

cliente.value = p.cliente;
telefono.value = p.telefono;
direccion.value = p.direccion;
distrito.value = p.distrito;
vendedor.value = p.vendedor;
medioPago.value = p.medioPago;
camion.value = p.camion;
observaciones.value = p.observaciones;
}

/* ELIMINAR */
async function eliminarPedido(id){
if(!confirm("¿Eliminar pedido?")) return;

await sendToSheets({action:"delete",id});
await cargarDesdeSheets();
}

/* ESTADO */
async function cambiarEstado(id){

const p = pedidos.find(x=>x.id===id);
p.estado = p.estado==="Entregado"?"Pendiente":"Entregado";

await sendToSheets({action:"updateStatus",id:p.id,estado:p.estado});
await cargarDesdeSheets();
}

/* FILTROS */
function aplicarFiltros(){

const d = filtroDistrito.value;
const f = filtroFecha.value;

pedidosFiltrados = pedidos.filter(p=>{
return (!d || p.distrito===d) &&
(!f || p.fecha.startsWith(f));
});

renderTabla();
}

function limpiarFiltros(){
filtroDistrito.value="";
filtroFecha.value="";
aplicarFiltros();
}

/* UI */
function actualizarDashboard(){

pendientes.innerText = pedidos.filter(p=>p.estado==="Pendiente").length;
entregados.innerText = pedidos.filter(p=>p.estado==="Entregado").length;
total.innerText = pedidos.length;
}

function cargarDistritos(){
filtroDistrito.innerHTML = `<option value="">Todos</option>`;

[...new Set(pedidos.map(p=>p.distrito))].forEach(d=>{
const opt=document.createElement("option");
opt.value=d;
opt.textContent=d;
filtroDistrito.appendChild(opt);
});
}

function renderTabla(){

tablaPedidos.innerHTML="";

pedidosFiltrados.forEach(p=>{

tablaPedidos.innerHTML += `
<tr>
<td>${p.id}</td>
<td>${p.cliente}</td>
<td>${p.telefono}</td>
<td>${p.direccion}</td>
<td>${p.distrito}</td>
<td>${p.vendedor}</td>
<td>${p.medioPago}</td>
<td>${p.camion}</td>
<td>${new Date(p.fecha).toLocaleString()}</td>

<td class="${p.estado==="Entregado"?'estado-entregado':'estado-pendiente'}">
${p.estado}
</td>

<td>${p.observaciones}</td>

<td>
<button class="btn-check" onclick="cambiarEstado(${p.id})">✓</button>
<button class="btn-edit" onclick="editarPedido(${p.id})">✏️</button>
<button class="btn-trash" onclick="eliminarPedido(${p.id})">🗑</button>
</td>
</tr>
`;
});
}

</script>

</body>
</html>
